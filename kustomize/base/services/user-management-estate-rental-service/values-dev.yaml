# user-management-service values for dev

replicaCount: 1

image:
  repository: user-management-service
  tag: 1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod" # As per original manifest
  - name: CONFIG_SERVER_URL
    value: "http://config-service:8888"
  - name: SPRING_APPLICATION_NAME
    value: "user-management-service"
  - name: PROD_DB_URL
    value: "jdbc:mysql://mysql:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
  - name: PROD_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: user-management-secrets
        key: PROD_DB_USERNAME
  - name: PROD_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user-management-secrets
        key: PROD_DB_PASSWORD

# In a generic chart, we might need to add probes to values.yaml if they differ significantly
# For now, I'll stick to the core generic chart and assume standard probes or keep it simple.
