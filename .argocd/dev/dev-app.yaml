apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: estate-rental-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/infrastructure-estate-rental.git
    targetRevision: main
    path: kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
